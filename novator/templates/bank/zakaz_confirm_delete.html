{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
  <div class="card">
    <div class="card-header">
      <h3>Удалить заказ #{{ zakaz.id }}?</h3>
    </div>
    <div class="card-body">
      <p>Команда: {{ zakaz.team.name }}</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Подтвердить удаление</button>
        <a href="{% url 'bank:zakaz_detail' zakaz.id %}" class="btn btn-secondary">Отмена</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
