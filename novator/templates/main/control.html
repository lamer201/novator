{% extends "base.html" %}
{% load static %}

{% block title %}Страничка ведущего{% endblock %}

{% block content %}

<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Страничка ведущего</h2>
    <div>
    </div>
  </div>

    <div class="d-flex flex-row mb-3 gap-3 overflow-auto py-2 px-1">
<form method="post" action="{% url 'main:next_year' %}">
    {% csrf_token %}
    <select name='year' class="form-select d-inline-block w-auto me-2">   
            <option value="{{ year }}">{{ year }}</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
    </select>
    <button type="submit" class="btn btn-outline-primary d-inline-flex align-items-center">
      Перевести год
    </button>
  </form>
    </div>

</div>

{% endblock %}
