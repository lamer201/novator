{% extends 'base.html' %}
{% load static %}

{% block title %}Новый запуск объекта{% endblock %}

{% block content %}
{% if messages %}
    <div class="container my-4">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

   <div class="container mt-4">
       <h1 class="mb-4">Создание нового запуска объекта</h1>
       <form method="post" class="needs-validation" novalidate>
           {% csrf_token %}
           <div class="row g-3">
               <div class="col-md-6">
                   <label for="team" class="form-label">Команда</label>
                   <select name="team" id="team" class="form-select" required>
                       <option value="" selected disabled>Выберите команду</option>
                       {% for team in teams %}
                           <option value="{{ team.id }}">{{ team.name }}</option>
                       {% endfor %}
                   </select>
               </div>

               <div class="col-md-6">
                   <label for="year" class="form-label">Год запуска</label>
                   <input type="number" name="year" id="year" class="form-control" required readonly value="{{ year }}">
               </div>

               <div class="col-md-6">
                   <label for="object" class="form-label">Объект</label>
                   <select name="object" id="object" class="form-select" required>
                       <option value="" selected disabled>Выберите объект</option>
                       {% for building in buildings %}
                           <option value="{{ building.id }}" data-cost="{{ building.property_value|default_if_none:'' }}">{{ building.name }}</option>
                       {% endfor %}
                   </select>
               </div>

               <div class="col-md-3">
                   <label for="koeff" class="form-label">Коэффициент</label>
                   <input type="number" step="0.01" name="koeff" id="koeff" class="form-control" required>
               </div>

               <div class="col-md-3">
                   <label for="profit" class="form-label">Прибыль</label>
                   <input type="text" name="profit" id="profit" class="form-control" value ="">
               </div>

               <div class="col-12 mt-3">
                   <button type="submit" class="btn btn-primary">Создать запуск</button>
               </div>
           </div>
       </form>
   </div>
{% endblock %}
