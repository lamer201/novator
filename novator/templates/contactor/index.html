{% extends "base.html" %}
{% load static %}
{% block title %}Подрядчик{% endblock %}

{% block content %}
<div class="container my-4">
  <h2 class="mb-4">Подрядчик</h2>
  <div class="card">
    <div class="card-body">
      <h5 class="card-title">Список команд</h5>
      <ul class="list-group list-group-flush">
        {% for team in teams %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          {{ team.name }}
          <a href="{% url 'contactor:team_detail' team.id %}" class="btn btn-primary btn-sm">Подробнее</a>
        </li>
        {% endfor %}
      </ul>
      {% if not teams %}
        <p class="text-muted">Команды не найдены.</p>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
