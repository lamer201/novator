{% extends 'base.html' %}
{% load static %}


{% block title %}Create Zakaz{% endblock %}

{% block content %}

<div class="container my-4">
  <h2 class="mb-4">Банк</h2>

<div class="d-flex flex-row mb-3 gap-3 overflow-auto py-2 px-1">
<a href="{% url 'bank:create_zakaz' %}?category=truba" style="display: block; text-decoration: none; color: inherit;"><button class="btn btn-outline-secondary d-inline-flex align-items-center" type="button">
Трубы</button></a>
<a href="{% url 'bank:create_zakaz' %}?category=ksgrs" style="display: block; text-decoration: none; color: inherit;"><button class="btn btn-outline-secondary d-inline-flex align-items-center" type="button">
КС/ГРС</button></a>
<a href="{% url 'bank:create_zakaz' %}?category=auto" style="display: block; text-decoration: none; color: inherit;"><button class="btn btn-outline-secondary d-inline-flex align-items-center" type="button">
Транспорт</button></a>
<a href="{% url 'bank:create_zakaz' %}?category=obuchenie" style="display: block; text-decoration: none; color: inherit;"><button class="btn btn-outline-secondary d-inline-flex align-items-center" type="button">
Обучение</button></a>
<a href="{% url 'bank:create_zakaz' %}?category=shtraf" style="display: block; text-decoration: none; color: inherit;"><button class="btn btn-outline-secondary d-inline-flex align-items-center" type="button">
Штрафы</button></a>
</div>
</div>
<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Список команд</h2>

  </div>

<div class="container my-4">
  <h2 class="text-center mb-4">Create Zakaz</h2>

  <div class="d-flex justify-content-left align-items-center mb-4 gap-3">
  <label class="form-label me-2">Баланс</label>
  <input type ='text' id="myText" readonly class="form-control w-auto">
  
  </div>

  <form method="post" class="needs-validation" novalidate>
    {% csrf_token %}

    {% if form %}
      {% for field in form %}
        <div class="mb-3 mt-3">
          <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
            {{ field }}
        </div>
      {% endfor %}
      <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary">Create Zakaz</button>
      <a href="{% url 'bank:zakaz_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>

</div>
    {% endif %}
<script type="text/javascript" src="{% static 'js/myscript.js' %}"></script>
{% endblock %}
